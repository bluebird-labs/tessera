<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>tessera graph viewer</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  #cy { position: absolute; inset: 0; }
  #status { position: fixed; top: 12px; right: 16px; font-size: 12px; opacity: 0.6; pointer-events: none; }
  #ui {
    position: fixed; top: 12px; left: 12px; z-index: 5;
    display: flex; flex-direction: column; gap: 8px;
    padding: 8px 10px; background: rgba(15, 23, 42, 0.85);
    border: 1px solid #334155; border-radius: 8px;
    font-size: 12px; backdrop-filter: blur(6px);
    max-width: calc(100vw - 24px);
  }
  #ui .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  #ui input[type="search"] {
    width: 220px; padding: 5px 8px; background: #0b1220; color: #e2e8f0;
    border: 1px solid #334155; border-radius: 4px; font: inherit; outline: none;
  }
  #ui input[type="search"]:focus { border-color: #6366f1; }
  #ui .group { display: flex; gap: 0; }
  #ui button {
    padding: 5px 10px; background: #0b1220; color: #cbd5e1;
    border: 1px solid #334155; cursor: pointer; font: inherit;
  }
  #ui .group button { border-radius: 0; border-right-width: 0; }
  #ui .group button:first-child { border-top-left-radius: 4px; border-bottom-left-radius: 4px; }
  #ui .group button:last-child { border-top-right-radius: 4px; border-bottom-right-radius: 4px; border-right-width: 1px; }
  #ui button:hover { background: #1e293b; color: #f1f5f9; }
  #ui button.active { background: #6366f1; color: #fff; border-color: #6366f1; }
  #ui .sep { width: 1px; align-self: stretch; background: #334155; }
  #filters { max-width: 64vw; }
  #filters .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 8px 3px 6px; border: 1px solid #334155; border-radius: 999px;
    background: #0b1220; color: #64748b; font: inherit; font-size: 11px;
    cursor: pointer; user-select: none;
  }
  #filters .chip:hover { background: #1e293b; color: #cbd5e1; }
  #filters .chip.on  { color: #f1f5f9; border-color: var(--accent, #6366f1); background: rgba(99,102,241,0.12); }
  #filters .chip .swatch { width: 8px; height: 8px; border-radius: 50%; background: var(--accent, #475569); border: 1px solid rgba(255,255,255,0.18); }
  #filters .chip:not(.on) .swatch { opacity: 0.35; }
  #filters .chip .count { color: inherit; opacity: 0.7; font-variant-numeric: tabular-nums; }
  #filters .meta { color: #64748b; padding: 0 4px; }
  #filters .meta button { padding: 0 4px; background: none; border: none; color: #94a3b8; cursor: pointer; font: inherit; font-size: 11px; }
  #filters .meta button:hover { color: #f1f5f9; }
  #tip {
    position: fixed; pointer-events: none; display: none;
    max-width: 360px; padding: 8px 10px; background: rgba(15, 23, 42, 0.95);
    border: 1px solid #334155; border-radius: 6px; font-size: 11px;
    line-height: 1.45; box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 10;
  }
  #tip .title { font-weight: 600; color: #f1f5f9; margin-bottom: 4px; word-break: break-all; }
  #tip dl { margin: 0; display: grid; grid-template-columns: max-content 1fr; gap: 2px 8px; }
  #tip dt { color: #94a3b8; }
  #tip dd { margin: 0; color: #e2e8f0; word-break: break-all; }
</style>
</head>
<body>
  <div id="ui">
    <div class="row">
      <input id="search" type="search" placeholder="filter by label…" autocomplete="off" />
      <div class="group" id="layouts">
        <button data-layout="fcose" class="active">fcose</button>
        <button data-layout="dagre">dagre</button>
        <button data-layout="breadthfirst">bfs</button>
      </div>
      <div class="sep"></div>
      <button id="fit">fit</button>
    </div>
    <div class="row" id="filters"></div>
  </div>
  <div id="cy"></div>
  <div id="status">loading…</div>
  <div id="tip"></div>

  <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/layout-base@2.0.1/layout-base.js"></script>
  <script src="https://unpkg.com/cose-base@2.2.0/cose-base.js"></script>
  <script src="https://unpkg.com/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
  <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>

  <script>
    cytoscape.use(window.cytoscapeFcose);
    cytoscape.use(window.cytoscapeDagre);

    const LAYOUTS = {
      fcose:        { name: 'fcose', animate: true, randomize: true, nodeRepulsion: 4500, idealEdgeLength: 80 },
      dagre:        { name: 'dagre', animate: true, rankDir: 'LR', nodeSep: 20, rankSep: 60 },
      breadthfirst: { name: 'breadthfirst', animate: true, directed: true, spacingFactor: 1.2 },
    };

    const status = document.getElementById('status');
    const ACCENT = '#94a3b8';

    // High-level architectural symbols. We default the viewer to types +
    // top-level scopes; methods/fields/locals are noisy and start hidden.
    // If a graph contains none of these, fall back to showing every kind.
    const HIGH_LEVEL_KINDS = new Set([
      'class', 'struct', 'enum', 'trait', 'interface',
      'module', 'namespace', 'package', 'file',
    ]);

    let currentLayoutCfg = LAYOUTS.fcose;
    let activeKinds = new Set();

    fetch('.tessera/graph.json')
      .then(r => r.json())
      .then(buildGraph)
      .catch(err => { status.textContent = 'error: ' + err.message; });

    // Graphviz -Tjson nests nodes + clusters in objects[]. Clusters carry a
    // `nodes` array; leaves do not. We render only leaves; edges' tail/head
    // _gvids point into objects[] but only ever reference leaves in well-formed
    // DOT, so dropping clusters is safe.
    function normalizeGraphvizJson(gv) {
      const objects = gv.objects || [];
      const rawEdges = gv.edges || [];

      const leafIds = new Set();
      const nodes = [];
      for (const o of objects) {
        if (Array.isArray(o.nodes)) continue;
        const id = String(o._gvid);
        leafIds.add(id);
        nodes.push({
          data: {
            id,
            label: o.label || o.name || id,
            name: o.name || '',
            kind: o.kind || '',
            shape: o.shape || '',
            fillcolor: o.fillcolor || '',
            color: o.color || '',
            fontcolor: o.fontcolor || '',
            degree: 0,
          },
        });
      }

      const edges = [];
      const degree = new Map();
      const bump = id => degree.set(id, (degree.get(id) || 0) + 1);
      for (const e of rawEdges) {
        const source = String(e.tail);
        const target = String(e.head);
        if (!leafIds.has(source) || !leafIds.has(target)) continue;
        edges.push({
          data: {
            id: 'e' + e._gvid,
            source,
            target,
            kind: e.kind || '',
            color: e.color || '',
          },
        });
        bump(source);
        if (target !== source) bump(target);
      }

      let maxDegree = 1;
      const kindCounts = new Map();
      const kindColors = new Map();
      for (const n of nodes) {
        const d = degree.get(n.data.id) || 0;
        n.data.degree = d;
        if (d > maxDegree) maxDegree = d;

        const k = n.data.kind || 'unknown';
        kindCounts.set(k, (kindCounts.get(k) || 0) + 1);
        if (!kindColors.has(k) && (n.data.color || n.data.fillcolor)) {
          kindColors.set(k, n.data.color || n.data.fillcolor);
        }
      }

      return { nodes, edges, maxDegree, kindCounts, kindColors };
    }

    // Map Graphviz "shape" attribute to a cytoscape shape. Cytoscape doesn't
    // know "folder" or "note", so fall back to rectangle for those.
    const SHAPE_MAP = {
      ellipse: 'ellipse', circle: 'ellipse',
      box: 'round-rectangle', rectangle: 'round-rectangle',
      diamond: 'diamond',
      folder: 'round-rectangle', note: 'round-rectangle',
    };

    function buildStylesheet(maxDegree) {
      return [
        { selector: 'node', style: {
            'background-color': function(n) { return n.data('fillcolor') || ACCENT; },
            'border-color':     function(n) { return n.data('color') || '#475569'; },
            'border-width': 1.5,
            'shape':            function(n) { return SHAPE_MAP[n.data('shape')] || 'ellipse'; },
            'label': 'data(label)',
            'color':            function(n) { return n.data('fontcolor') || '#e2e8f0'; },
            'text-outline-color': '#0f172a',
            'text-outline-width': 1.5,
            'text-valign': 'center',
            'text-halign': 'center',
            'font-size': 7,
            'min-zoomed-font-size': 8,
            'width':  `mapData(degree, 0, ${maxDegree}, 12, 64)`,
            'height': `mapData(degree, 0, ${maxDegree}, 12, 64)`,
        } },
        { selector: 'edge', style: {
            'line-color':         function(e) { return e.data('color') || '#475569'; },
            'target-arrow-color': function(e) { return e.data('color') || '#475569'; },
            'target-arrow-shape': 'triangle',
            'arrow-scale': 0.7,
            'width': 1,
            'curve-style': 'bezier',
            'opacity': 0.55,
        } },
        { selector: '.faded', style: { 'opacity': 0.12, 'text-opacity': 0 } },
        { selector: '.hl',    style: { 'opacity': 1, 'z-index': 10 } },
        { selector: 'node.hl', style: { 'border-width': 3, 'border-color': '#facc15' } },
        { selector: 'edge.hl', style: { 'line-color': '#facc15', 'target-arrow-color': '#facc15', 'width': 2, 'opacity': 1 } },
        { selector: '.hidden', style: { 'display': 'none' } },
      ];
    }

    // Keys we already render in the title or that are noise in a tooltip.
    const TIP_SKIP = new Set(['id', 'source', 'target', 'label', 'degree', 'shape']);

    function showTooltip(node, evt) {
      const tip = document.getElementById('tip');
      const data = node.data();
      const rows = Object.entries(data)
        .filter(([k, v]) => !TIP_SKIP.has(k) && v !== '' && v != null)
        .map(([k, v]) => `<dt>${k}</dt><dd>${escapeHtml(String(v))}</dd>`)
        .join('');
      tip.innerHTML = `<div class="title">${escapeHtml(data.label || data.id)}</div><dl>${rows}</dl>`;
      tip.style.display = 'block';
      moveTooltip(evt);
    }

    function moveTooltip(evt) {
      const tip = document.getElementById('tip');
      const e = evt.originalEvent || evt;
      const x = (e.clientX || 0) + 14;
      const y = (e.clientY || 0) + 14;
      const w = tip.offsetWidth, h = tip.offsetHeight;
      const maxX = window.innerWidth - w - 8;
      const maxY = window.innerHeight - h - 8;
      tip.style.left = Math.min(x, maxX) + 'px';
      tip.style.top  = Math.min(y, maxY) + 'px';
    }

    function hideTooltip() {
      document.getElementById('tip').style.display = 'none';
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
    }

    function highlightNeighborhood(node) {
      const cy = node.cy();
      const hood = node.closedNeighborhood();
      cy.batch(() => {
        cy.elements().addClass('faded').removeClass('hl');
        hood.removeClass('faded').addClass('hl');
      });
    }

    function clearHighlight(cy) {
      cy.batch(() => cy.elements().removeClass('faded hl'));
    }

    function wireEvents(cy) {
      cy.on('tap', 'node', evt => highlightNeighborhood(evt.target));
      cy.on('tap', evt => { if (evt.target === cy) clearHighlight(cy); });
      cy.on('mouseover', 'node', evt => showTooltip(evt.target, evt));
      cy.on('mousemove', 'node', evt => moveTooltip(evt));
      cy.on('mouseout',  'node', hideTooltip);
      cy.on('viewport', hideTooltip);
    }

    function applyKindFilter(cy) {
      cy.batch(() => {
        cy.nodes().forEach(n => {
          const visible = activeKinds.has(n.data('kind') || 'unknown');
          n.toggleClass('hidden', !visible);
          if (!visible) n.removeClass('hl faded');
        });
        cy.edges().forEach(e => {
          const hide = e.source().hasClass('hidden') || e.target().hasClass('hidden');
          e.toggleClass('hidden', hide);
          if (hide) e.removeClass('hl faded');
        });
      });
      updateStatus(cy);
    }

    function runLayout(cy) {
      cy.layout({ ...currentLayoutCfg, eles: cy.elements(':visible') }).run();
    }

    function buildFilters(cy, kindCounts, kindColors) {
      const container = document.getElementById('filters');
      container.innerHTML = '';

      const sorted = [...kindCounts.entries()].sort((a, b) => b[1] - a[1]);
      const hasHighLevel = sorted.some(([k]) => HIGH_LEVEL_KINDS.has(k));
      activeKinds = new Set(sorted
        .map(([k]) => k)
        .filter(k => hasHighLevel ? HIGH_LEVEL_KINDS.has(k) : true));

      const meta = document.createElement('span');
      meta.className = 'meta';
      meta.innerHTML = '<button id="filterAll">all</button> · <button id="filterNone">none</button> · <button id="filterDefault">default</button>';
      container.appendChild(meta);

      const chips = new Map();
      for (const [kind, count] of sorted) {
        const chip = document.createElement('button');
        chip.className = 'chip' + (activeKinds.has(kind) ? ' on' : '');
        chip.dataset.kind = kind;
        chip.style.setProperty('--accent', kindColors.get(kind) || '#475569');
        chip.innerHTML = `<span class="swatch"></span>${escapeHtml(kind)}<span class="count">${count}</span>`;
        chip.addEventListener('click', () => {
          if (activeKinds.has(kind)) activeKinds.delete(kind);
          else activeKinds.add(kind);
          chip.classList.toggle('on');
          applyKindFilter(cy);
          runLayout(cy);
        });
        container.appendChild(chip);
        chips.set(kind, chip);
      }

      const setActive = next => {
        activeKinds = new Set(next);
        for (const [k, chip] of chips) chip.classList.toggle('on', activeKinds.has(k));
        applyKindFilter(cy);
        runLayout(cy);
      };
      document.getElementById('filterAll').addEventListener('click', () => setActive(sorted.map(([k]) => k)));
      document.getElementById('filterNone').addEventListener('click', () => setActive([]));
      document.getElementById('filterDefault').addEventListener('click', () =>
        setActive(sorted.map(([k]) => k).filter(k => hasHighLevel ? HIGH_LEVEL_KINDS.has(k) : true)));
    }

    function updateStatus(cy) {
      const totalN = cy.nodes().length, totalE = cy.edges().length;
      const visN = cy.nodes(':visible').length, visE = cy.edges(':visible').length;
      status.textContent = (visN === totalN && visE === totalE)
        ? `${totalN} nodes · ${totalE} edges`
        : `${visN}/${totalN} nodes · ${visE}/${totalE} edges`;
    }

    function applySearch(cy, q) {
      const needle = q.trim().toLowerCase();
      if (!needle) { clearHighlight(cy); return; }
      cy.batch(() => {
        cy.elements(':visible').addClass('faded').removeClass('hl');
        cy.nodes(':visible').forEach(n => {
          const label = (n.data('label') || '').toLowerCase();
          const name  = (n.data('name')  || '').toLowerCase();
          if (label.includes(needle) || name.includes(needle)) {
            n.removeClass('faded').addClass('hl');
          }
        });
      });
    }

    function wireUi(cy) {
      const search = document.getElementById('search');
      search.addEventListener('input', () => applySearch(cy, search.value));

      const layoutButtons = document.querySelectorAll('#layouts button');
      layoutButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          const cfg = LAYOUTS[btn.dataset.layout];
          if (!cfg) return;
          layoutButtons.forEach(b => b.classList.toggle('active', b === btn));
          currentLayoutCfg = cfg;
          runLayout(cy);
        });
      });

      document.getElementById('fit').addEventListener('click', () => cy.fit(cy.elements(':visible'), 40));
    }

    function buildGraph(gv) {
      const { nodes, edges, maxDegree, kindCounts, kindColors } = normalizeGraphvizJson(gv);

      const cy = cytoscape({
        container: document.getElementById('cy'),
        elements: [...nodes, ...edges],
        style: buildStylesheet(maxDegree),
        layout: { name: 'null' },
        wheelSensitivity: 0.2,
      });

      buildFilters(cy, kindCounts, kindColors);
      applyKindFilter(cy);
      wireEvents(cy);
      wireUi(cy);
      runLayout(cy);
    }
  </script>
</body>
</html>
