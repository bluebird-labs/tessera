<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>tessera graph viewer</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  #cy { position: absolute; inset: 0; }
  #status { position: fixed; top: 12px; right: 16px; font-size: 12px; opacity: 0.6; pointer-events: none; }
</style>
</head>
<body>
  <div id="cy"></div>
  <div id="status">loading…</div>

  <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/layout-base@2.0.1/layout-base.js"></script>
  <script src="https://unpkg.com/cose-base@2.2.0/cose-base.js"></script>
  <script src="https://unpkg.com/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>

  <script>
    cytoscape.use(window.cytoscapeFcose);

    const status = document.getElementById('status');
    const ACCENT = '#94a3b8';

    fetch('graph.json')
      .then(r => r.json())
      .then(buildGraph)
      .catch(err => { status.textContent = 'error: ' + err.message; });

    // Graphviz -Tjson nests nodes + clusters in objects[]. Clusters carry a
    // `nodes` array; leaves do not. We render only leaves; edges' tail/head
    // _gvids point into objects[] but only ever reference leaves in well-formed
    // DOT, so dropping clusters is safe.
    function normalizeGraphvizJson(gv) {
      const objects = gv.objects || [];
      const rawEdges = gv.edges || [];

      const leafIds = new Set();
      const nodes = [];
      for (const o of objects) {
        if (Array.isArray(o.nodes)) continue;
        const id = String(o._gvid);
        leafIds.add(id);
        nodes.push({
          data: {
            id,
            label: o.label || o.name || id,
            name: o.name || '',
            kind: o.kind || '',
            shape: o.shape || '',
            fillcolor: o.fillcolor || '',
            color: o.color || '',
            fontcolor: o.fontcolor || '',
          },
        });
      }

      const edges = [];
      for (const e of rawEdges) {
        const source = String(e.tail);
        const target = String(e.head);
        if (!leafIds.has(source) || !leafIds.has(target)) continue;
        edges.push({
          data: {
            id: 'e' + e._gvid,
            source,
            target,
            kind: e.kind || '',
            color: e.color || '',
          },
        });
      }

      return { nodes, edges };
    }

    function annotateDegrees(cy) {
      let max = 0;
      cy.nodes().forEach(n => {
        const d = n.degree();
        n.data('degree', d);
        if (d > max) max = d;
      });
      return Math.max(max, 1);
    }

    // Map Graphviz "shape" attribute to a cytoscape shape. Cytoscape doesn't
    // know "folder" or "note", so fall back to rectangle for those.
    const SHAPE_MAP = {
      ellipse: 'ellipse', circle: 'ellipse',
      box: 'round-rectangle', rectangle: 'round-rectangle',
      diamond: 'diamond',
      folder: 'round-rectangle', note: 'round-rectangle',
    };

    function buildStylesheet(maxDegree) {
      return [
        { selector: 'node', style: {
            'background-color': function(n) { return n.data('fillcolor') || ACCENT; },
            'border-color':     function(n) { return n.data('color') || '#475569'; },
            'border-width': 1.5,
            'shape':            function(n) { return SHAPE_MAP[n.data('shape')] || 'ellipse'; },
            'label': 'data(label)',
            'color':            function(n) { return n.data('fontcolor') || '#e2e8f0'; },
            'text-outline-color': '#0f172a',
            'text-outline-width': 1.5,
            'text-valign': 'center',
            'text-halign': 'center',
            'font-size': 7,
            'min-zoomed-font-size': 8,
            'width':  `mapData(degree, 0, ${maxDegree}, 12, 64)`,
            'height': `mapData(degree, 0, ${maxDegree}, 12, 64)`,
        } },
        { selector: 'edge', style: {
            'line-color':         function(e) { return e.data('color') || '#475569'; },
            'target-arrow-color': function(e) { return e.data('color') || '#475569'; },
            'target-arrow-shape': 'triangle',
            'arrow-scale': 0.7,
            'width': 1,
            'curve-style': 'bezier',
            'opacity': 0.55,
        } },
      ];
    }

    function buildGraph(gv) {
      const { nodes, edges } = normalizeGraphvizJson(gv);
      status.textContent = `${nodes.length} nodes · ${edges.length} edges`;

      const cy = cytoscape({
        container: document.getElementById('cy'),
        elements: [...nodes, ...edges],
        style: buildStylesheet(1),
        layout: { name: 'fcose', animate: true, randomize: true, nodeRepulsion: 4500, idealEdgeLength: 80 },
        wheelSensitivity: 0.2,
      });

      const maxDegree = annotateDegrees(cy);
      cy.style(buildStylesheet(maxDegree));
    }
  </script>
</body>
</html>
